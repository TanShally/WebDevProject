<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini App | Guessing Game</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top right, #ffeab6, #c9ecff 55%, #e8ddff);
      color: #1f2a37;
    }

    .app {
      width: min(92vw, 520px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #becce0;
      border-radius: 14px;
      padding: 1.2rem;
      box-shadow: 0 10px 22px rgba(24, 39, 64, 0.14);
    }

    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      margin: 0.9rem 0;
    }

    input,
    button {
      font: inherit;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #9db3d1;
    }

    input {
      flex: 1;
    }

    button {
      background: #1565c0;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #0e4f98;
    }

    .status {
      font-weight: 700;
      min-height: 1.2rem;
      color: #184a7b;
    }

    .links {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Number Guessing Game</h1>
    <p>Guess a number from 1 to 100. You get 7 tries.</p>

    <div class="controls">
      <input id="guessInput" type="number" min="1" max="100" placeholder="Enter guess" />
      <button id="guessBtn">Guess</button>
    </div>

    <div class="status" id="statusText"></div>
    <p id="triesText">Tries left: 7</p>

    <div class="links">
      <a href="scratch.html">Back to Scratch Page</a>
      <a href="index.html">Back to Home</a>
    </div>
  </div>

  <script>
    const maxTries = 7;
    let secret = Math.floor(Math.random() * 100) + 1;
    let triesLeft = maxTries;

    const guessInput = document.getElementById('guessInput');
    const guessBtn = document.getElementById('guessBtn');
    const statusText = document.getElementById('statusText');
    const triesText = document.getElementById('triesText');

    function endGame(message) {
      statusText.textContent = message;
      guessBtn.disabled = true;
      guessInput.disabled = true;
    }

    guessBtn.addEventListener('click', function () {
      const guess = Number(guessInput.value);
      if (!Number.isInteger(guess) || guess < 1 || guess > 100) {
        statusText.textContent = 'Enter a whole number between 1 and 100.';
        return;
      }

      triesLeft -= 1;

      if (guess === secret) {
        endGame('Nice work. You guessed it!');
        return;
      }

      if (triesLeft === 0) {
        endGame('Game over. The number was ' + secret + '.');
        return;
      }

      statusText.textContent = guess < secret ? 'Too low. Try higher.' : 'Too high. Try lower.';
      triesText.textContent = 'Tries left: ' + triesLeft;
      guessInput.value = '';
      guessInput.focus();
    });
  </script>
</body>
</html>
